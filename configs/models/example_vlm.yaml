# Example Vision-Language Model configuration
name: "example_vlm"
type: "huggingface"  # huggingface, openai, custom
model_name: "microsoft/git-base"

# Model parameters
parameters:
  max_length: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: false

# Processing configuration
preprocessing:
  image_size: [224, 224]
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Generation settings
generation:
  max_new_tokens: 100
  num_beams: 1
  early_stopping: true

# Resource settings
resources:
  batch_size: 8
  device: "auto"
  precision: "fp16"  # fp32, fp16, bf16